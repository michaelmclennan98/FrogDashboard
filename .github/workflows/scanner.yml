name: Frog Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run scanner once
        run: |
          python scanner.py

      - name: Commit updated results
        run: |
          git config user.name "frog-scanner"
          git config user.email "frog-scanner@users.noreply.github.com"
          git add results scanner_state.json
          git commit -m "update scanner results" || echo "No changes to commit"
          git push
